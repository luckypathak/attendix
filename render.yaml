services:
  # 1. Django Backend Web Service
  - type: web
    name: attendix-backend
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "gunicorn attendix.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_yNGsD6wpd7Fg@ep-flat-tree-at7ps4y8.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: REDIS_URL
        value: rediss://default:gQAAAAAAAsiCAAIgcDFmY2Q5ZGQ4NjkwZGQ0N2U2ODE0NzBlYTA5MzY3ZTk0NQ@divine-unicorn-182402.upstash.io:6379

  # 2. Celery Worker (Task Executor)
  - type: worker
    name: attendix-celery-worker
    runtime: python
    rootDir: "backend"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "./start.sh worker"
    envVars:
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_yNGsD6wpd7Fg@ep-flat-tree-at7ps4y8.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require
      - key: REDIS_URL
        value: rediss://default:gQAAAAAAAsiCAAIgcDFmY2Q5ZGQ4NjkwZGQ0N2U2ODE0NzBlYTA5MzY3ZTk0NQ@divine-unicorn-182402.upstash.io:6379

  # 3. Celery Beat (Task Scheduler)
  - type: worker
    name: attendix-celery-beat
    runtime: python
    rootDir: "backend"
    buildCommand: "pip install -r requirements.txt"
    startCommand: "./start.sh beat"
    envVars:
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_yNGsD6wpd7Fg@ep-flat-tree-at7ps4y8.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require
      - key: REDIS_URL
        value: rediss://default:gQAAAAAAAsiCAAIgcDFmY2Q5ZGQ4NjkwZGQ0N2U2ODE0NzBlYTA5MzY3ZTk0NQ@divine-unicorn-182402.upstash.io:6379

  # 4. React Frontend Static Site
  - type: web
    name: attendix-frontend
    runtime: static
    buildCommand: "npm run build"
    publishDir: "dist"
    # Root directory for frontend
    rootDir: "frontend"
    envVars:
      - key: VITE_API_URL
        value: https://attendix-xeoa.onrender.com/api/v1
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
